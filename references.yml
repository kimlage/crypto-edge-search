# references.yml — machine-readable bibliography for crypto-edge-search
#
# One entry per cited work in docs/REFERENCES.md (the annotated bibliography).
# This file is the source of truth that scripts/refs-check.ts validates.
#
# Schema (per entry):
#   key       BibTeX citation key (matches references.bib; unique)
#   authors   list of author surnames-first strings (verbatim order)
#   year      publication year (integer; for "rev." works, the original year)
#   title     work title
#   venue     journal / publisher / working-paper series
#   doi       resolving DOI (without the https://doi.org/ prefix), or null
#   url       canonical resolving URL, or null
#   status    one of: peer-reviewed | working-paper | practitioner | unverified
#   used_by   list of gate-ids and/or script-ids this work backs
#
# Gate ids (the committed gauntlet, in binding order):
#   net_of_cost, baselines, deflated_sharpe, block_bootstrap,
#   cpcv_pbo, haircut, surrogate, holdout
# Script ids (per-domain harnesses / primitives referenced in docs):
#   statistical-validation  (src/lib/training/statistical-validation.ts primitives)
#   edgehunt-D2, edgehunt-D5, edgehunt-D7, edgehunt-D348,
#   edgehunt-quant, edgehunt-onchain2, edgehunt-deepen, edgehunt-audit
#
# INVARIANT enforced by refs-check.ts: every entry has a doi OR url; status is
# valid; and every peer-reviewed / working-paper entry has a doi OR url (hard fail
# otherwise). Links web-verified 2026-06-01; BIS WP 1087 authorship web-verified
# 2026-06-02 (Schmeling, Schrimpf & Todorov — NOT Aramonte/Huang/Schrimpf).


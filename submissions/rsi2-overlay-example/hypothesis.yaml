# EXAMPLE submission hypothesis — KILLS BY DESIGN.
#
# This is the worked example for the community gauntlet: an RSI(2) long/flat
# overlay on a SEEDED SYNTHETIC noise panel (see generate-stub.mjs). An
# oscillator overlay on pure noise has no edge by construction, so the expected
# (and intended) verdict is KILL. It exists to demonstrate the submission
# format end-to-end, not to endorse the rule.
#
# Format: HypothesisSpec, parsed by src/lib/spec/hypothesis-spec.ts
# (loadHypothesisSpec) — the same file `crypto-edge prereg` consumes.
id: rsi2-overlay-example
name: "EXAMPLE (kills by design): RSI(2) long/flat overlay on a synthetic noise panel"
claimType: predictive
mechanism: >
  A 2-period RSI below 10 marks a short-horizon oversold extreme; going long at
  that close and staying flat otherwise is claimed to harvest short-horizon mean
  reversion. On this panel the claim is false by construction (the panel is
  seeded iid-style noise with a common drift), so the example demonstrates what
  an honest KILL looks like. The single config (period=2, entry<10, long/flat)
  was frozen before any returns were generated.
data:
  sources:
    - synthetic-noise-stub-seed-1337 # generate-stub.mjs, deterministic, $0
  pointInTime: as_of # generated once, never revised
  fidelity: synthetic # NOT market data — a worked-example fixture
cost:
  taker_bps_per_side: 5
  maker_bps_per_side: 1
  maker_fraction: 0
  slippage_bps: 2
search:
  selection_mode: preregistered_single # ONE config frozen up front -> honest N=1
  configCount: 1 # MUST be exactly 1 for preregistered_single
baselines:
  - buy_and_hold
  - equal_weight
  - random_lottery
surrogate:
  type: block # Politis-Romano stationary block bootstrap (temporal null)
holdout:
  policy: tail
  fraction: 0.20 # most-recent 20% reserved as the consume-once vault
